trigger:
  branches:
    include:
      - main

pool:
  name: Default
  demands:
    - agent.name -equals SMIL-Agent

variables:
  - group: smil-dev-workspace

stages:

  # ===========================================
  # STAGE 1: RUN TESTS WITH COVERAGE
  # ===========================================
  - stage: Test_Dev
    displayName: 'Run Tests with Coverage'
    jobs:
      - job: TestDev
        displayName: 'Pytest with Coverage'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.10'

          - script: pip install -r requirements.txt
            displayName: 'Install dependencies'
            workingDirectory: $(System.DefaultWorkingDirectory)/smil

          - script: |
              pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-fail-under=85
            displayName: 'Run tests with coverage'
            workingDirectory: $(System.DefaultWorkingDirectory)/smil
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST)
              DATABRICKS_TOKEN: $(DATABRICKS_TOKEN)

  # ===========================================
  # STAGE 2: DEPLOY TO DEV
  # ===========================================
  - stage: Deploy_Dev
    displayName: 'Deploy to DEV'
    dependsOn: Test_Dev
    condition: succeeded()
    jobs:
      - job: DeployDev
        displayName: 'DAB Deploy to DEV'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.10'

          - script: |
              curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            displayName: 'Install Databricks CLI'

          - script: pip install -r requirements.txt
            displayName: 'Install dependencies'
            workingDirectory: $(System.DefaultWorkingDirectory)/smil

          - script: databricks bundle validate
            displayName: 'Validate bundle'
            workingDirectory: $(System.DefaultWorkingDirectory)/smil
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST)
              DATABRICKS_TOKEN: $(DATABRICKS_TOKEN)

          - script: databricks bundle deploy -t dev
            displayName: 'Deploy to DEV'
            workingDirectory: $(System.DefaultWorkingDirectory)/smil
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST)
              DATABRICKS_TOKEN: $(DATABRICKS_TOKEN)